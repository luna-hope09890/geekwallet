{% extends "navbar.html" %} {% block content %}

<link
  rel="stylesheet"
  href="{{ url_for('static', filename='css/dreport.css') }}"
/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
<!-- 00% on donut-->
<div class="reports-top-row">
  <h1 class="reports-title">Reports</h1>

  <div class="date-bar">
    <a href="/dreports?month={{ prev_month }}&year={{ prev_year }}">
      <button class="date-btn">◀</button>
    </a>

    <div class="date-text" id="dateTextBox">
      <span id="monthDisplay" class="month-display"></span>

      <i class="fa-regular fa-calendar calendar-icon"></i>

      <input
        type="month"
        id="monthPicker"
        value="{{ year }}-{{ '%02d'|format(month) }}"
      />
    </div>

    <a href="/dreports?month={{ next_month }}&year={{ next_year }}">
      <button class="date-btn">▶</button>
    </a>
  </div>
</div>

<div class="container-report">
  <div class="card card-blue">
    <h3>Income vs. Expenses</h3>
    <div class="chart-container">
      <canvas id="incomeVsExpensesChart"></canvas>
    </div>
  </div>
  <div class="card card-yellow">
    <h3>Income Sources</h3>
    <div class="chart-container"><canvas id="incomeSourcesChart"></canvas></div>
  </div>
  <div class="card card-purple">
    <h3>Category Summary</h3>
    <div class="chart-container">
      <canvas id="categorySummaryChart"></canvas>
    </div>
  </div>
  <div class="card card-red">
    <h3>Spending Categories</h3>
    <!-- <h1>Test: {{ spending.labels }}</h1> -->
    <div class="chart-container">
      <canvas id="spendingCategoriesChart"></canvas>
    </div>
  </div>
</div>

<script>
      document.addEventListener("DOMContentLoaded", function () {
    const monthPicker = document.getElementById("monthPicker");
    const monthDisplay = document.getElementById("monthDisplay");

    function formatMonthRange(value) {
      const [yearText, monthText] = value.split("-");
      const year = Number(yearText);
      const month = Number(monthText);

      const startDate = new Date(year, month - 1, 1);
      const endDate = new Date(year, month, 0);

      const monthName = startDate.toLocaleString("en-US", {
        month: "short",
      });

      const startDay = String(startDate.getDate()).padStart(2, "0");
      const endDay = String(endDate.getDate()).padStart(2, "0");

      return `${monthName} ${startDay}, ${year} - ${monthName} ${endDay}, ${year}`;
    }

    monthDisplay.textContent = formatMonthRange(monthPicker.value);

    document
      .getElementById("dateTextBox")
      .addEventListener("click", function () {
        monthPicker.showPicker();
      });

    monthPicker.addEventListener("change", function () {
      const [year, month] = this.value.split("-");
      window.location.href = `/dreports?month=${month}&year=${year}`;
    });
  });

      // Wait for the HTML page to be fully loaded before running Chart logic
      document.addEventListener("DOMContentLoaded", function () {

        const spendingLabels = {{ (spending.labels | default ([])) | tojson | safe }};
      const spendingData = {{ (spending.amounts | default ([])) | tojson | safe }};

      const incomeLabels = {{ (income.labels | default ([])) | tojson | safe }};
      const incomeData = {{ (income.amounts | default ([])) | tojson | safe }};

      const summaryLabels = {{ (summary.labels | default ([])) | tojson | safe }};
      const summaryData = {{ (summary.amounts | default ([])) | tojson | safe }};

      const trackerMonths = {{ (tracker.months | default ([])) | tojson | safe }};
      const trackerIncome = {{ (tracker.income | default ([])) | tojson | safe }};
      const trackerExpenses = {{ (tracker.expenses | default ([])) | tojson | safe }};

      // Fixed colors for all default categories
      const categoryColors = {
        // Income
        "Salary": "#76D765",
        "Freelance": "#FF9F43",
        "Investments": "#1ABC9C",
        "Bonus": "#FFDA79",
        "Allowance": "#4BCFFA",
        "Business": "#00D2D3",
        "Pocket Money": "#FF7979",
        "Other Income": "#F8EFBA",
        "Other…": "#C8B6FF",

    // Expense
        "Food": "#FF6B6B",
        "Rent & Housing": "#FEFE70",
        "Shopping": "#A55EEA",
        "Transportation": "#45AAF2",
        "Snacks": "#FF8F8F",
        "Bills & Payments": "#FFB373",
        "Entertainment": "#70A1FF",
        "Education": "#1E90FF",
        "Healthcare": "#2ED573",
        "Personal Care": "#FD7272",
        "Travel": "#1EDED3",
        "Clothing": "#9B59B6",
        "Savings": "#2AE692",
        "Gifts": "#FF9EC9",
        "Donations": "#FF6B81",
        "Stationery": "#535C68",
        "Fitness": "#00CECE",
        "Loans": "#95AFC0",
        "Other Expenses": "#A5B1C2"
      };

      function getChartColors(labels) {
        return labels.map(label => categoryColors[label] || "#CCCCCC");
      }

      // Income vs Expense (Line Chart)
      const ctx1 = document.getElementById('incomeVsExpensesChart').getContext('2d');
      new Chart(ctx1, {
        type: 'line',
        data: {
          labels: trackerMonths,
          datasets: [
            {
              label: 'Income',
              data: trackerIncome,
              borderColor: '#4A7FF7',
              backgroundColor: '#4A7FF7',
              tension: 0.45,
              borderWidth: 3,
              pointRadius: 2
            },
            {
              label: 'Expenses',
              data: trackerExpenses,
              borderColor: '#AE8DF5',
              backgroundColor: '#AE8DF5',
              tension: 0.45,
              borderWidth: 3,
              pointRadius: 2
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          plugins: {
            legend: {
              position: 'top',
              labels: {
                font: {
                  size: 8
                },
                boxWidth: 10,
                boxHeight: 6,
                padding: 8
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                font: { size: 8 },
                callback: v => v.toLocaleString()
              }
            },
            x: {
              ticks: {
                font: { size: 8 }
              },
              grid: { display: false }
            }
          }
        }
      });

      // Category Summary (Bar Chart)
      new Chart(document.getElementById('categorySummaryChart').getContext('2d'), {
        type: 'bar',
        data: {
          labels: summaryLabels,
          datasets: [{
            data: summaryData,
            backgroundColor: getChartColors(summaryLabels),
            borderRadius: 12,
            borderSkipped: false
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          plugins: { legend: { display: false } },
          scales: {
            y: {
              beginAtZero: true,
              ticks: {
                font: { size: 8 },
                callback: v => v.toLocaleString()
              }
            },
            x: {
              ticks: {
                font: { size: 8 }
              },
              grid: { display: false }
            }
          }
        }
      });

      // Income Sources (Doughnut)
      const ctx3 = document.getElementById('incomeSourcesChart').getContext('2d');
      new Chart(ctx3, {
        plugins: [ChartDataLabels],
        type: 'doughnut',
        data: {
          labels: incomeLabels,
          datasets: [{
            data: incomeData,
            backgroundColor: getChartColors(incomeLabels),
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          cutout: '60%',
          plugins: {
            datalabels: {
              color: '#ffffff',
              font: {
                size: 8,
                weight: 'bold'
              },
              anchor: 'center',
              align: 'center',
              formatter: function(value, context) {
                const data = context.chart.data.datasets[0].data;
                const total = data.reduce((sum, num) => sum + num, 0);
                const percentage = total
                  ? Math.round(value / total * 100)
                  : 0;
                return percentage >= 3 ? percentage + '%' : '';
              }
            },
            //------
            legend: {
              position: 'right',
              labels: {
                font: {size: 8, weight: 'bold'},
                boxWidth: 10,
                boxHeight: 6,
                padding: 6,

                generateLabels(chart) {
                  const data = chart.data;
                  const dataset = data.datasets[0];
                  const total = dataset.data.reduce((a, b) => a + b, 0);
                  return data.labels.map((label, i) => {
                    const value = dataset.data[i];
                    const percent = total
                      ? Math.round(value / total * 100)
                      : 0;

                    return {
                      text: label,
                      fillStyle: dataset.backgroundColor[i],
                      strokeStyle: dataset.backgroundColor[i],
                      hidden: false,
                      index: i
                    };
                  });

                }

              }
            }
            //--------
          }
        }
      });

      // Spending Categories (Doughnut)
      const ctx4 = document.getElementById('spendingCategoriesChart').getContext('2d');
      new Chart(ctx4, {
        plugins: [ChartDataLabels],
        type: 'doughnut',
        data: {
          labels: spendingLabels,
          datasets: [{
            data: spendingData,
            backgroundColor: getChartColors(spendingLabels),
            borderWidth: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: false,
          cutout: '60%',
          plugins: {
            datalabels: {
              color: '#ffffff',
              font: {
                size: 8,
                weight: 'bold'
              },
              anchor: 'center',
              align: 'center',
              formatter: function(value, context) {
                const data = context.chart.data.datasets[0].data;
                const total = data.reduce((sum, num) => sum + num, 0);
                const percentage = total
                  ? Math.round(value / total * 100)
                  : 0;
                return percentage >= 3 ? percentage + '%' : '';
              }
            },

            //------
            legend: {
              position: 'right',
              labels: {
                font: {size: 8,weight: 'bold'},
                boxWidth: 10,
                boxHeight: 6,
                padding: 6,

                generateLabels(chart) {
                  const data = chart.data;
                  const dataset = data.datasets[0];
                  const total = dataset.data.reduce((a, b) => a + b, 0);
                  return data.labels.map((label, i) => {
                    const value = dataset.data[i];
                    const percent = total
                      ? Math.round(value / total * 100)
                      : 0;

                    return {
                      text: label,
                      fillStyle: dataset.backgroundColor[i],
                      strokeStyle: dataset.backgroundColor[i],
                      hidden: false,
                      index: i
                    };
                  });

                }

              }
            }
            //--------
          }
        }
      });
    }); // End of DOMContentLoaded
</script>
{% endblock %}

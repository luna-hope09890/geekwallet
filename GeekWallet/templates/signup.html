<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GeekWallet</title>
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='images/wallet.png') }}"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/public_nav.css') }}"
    />

    <style>
      body {
        font-family: Georgia, "Times New Roman", serif;
      }
    </style>
  </head>
  <body class="bg-gray-100 min-h-screen">
    <!-- NAVBAR -->
    <nav class="public-topbar public-topbar-center">
      <a href="/" class="public-logo">
        <i class="fa-solid fa-wallet"></i>
        GeekWallet
      </a>
    </nav>

    <!-- SIGNUP CONTAINER -->
    <div class="flex justify-center px-6 py-16">
      <div
        class="bg-white p-10 rounded-2xl shadow-lg border border-gray-200 w-full max-w-md"
      >
        <h1 class="text-3xl font-bold text-center mb-2">Sign Up</h1>
        <div id="signupStatusArea" class="text-center mb-4 relative">
          <p id="signupDefaultSubtitle" class="text-gray-500">
            Create an account to take control of your spending today.
          </p>

          {% if message %}
          <div id="signupMessage" class="message-card {{ message.type }}">
            <strong>{{ message.title }}</strong>
            {% if message.detail %}
            <div>{{ message.detail }}</div>
            {% endif %}
          </div>
          {% endif %}
        </div>

        {% if redirect %}
        <script>
          setTimeout(() => {
            window.location.href = "/login";
          }, 2000);
        </script>
        {% endif %}

        <form method="POST" action="/signup">
          <!-- Name -->
          <div class="mb-4 relative">
            <label class="block mb-1">Name</label>
            <input
              type="text"
              id="signupName"
              name="name"
              value="{{ name }}"
              {%
              if
              redirect
              %}disabled{%
              endif
              %}
              class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
              placeholder="Enter your name"
            />
            <div id="signupNameError" class="form-error"></div>
          </div>

          <!-- Email -->
          <div class="mb-4 relative">
            <label class="block mb-1">Email</label>
            <input
              type="text"
              id="signupEmail"
              name="email"
              value="{{ email }}"
              {%
              if
              redirect
              %}disabled{%
              endif
              %}
              class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
              placeholder="Enter your email"
            />
            <div id="signupEmailError" class="form-error"></div>
          </div>

          <!-- Password -->
          <div class="mb-4">
            <label class="block mb-1">Password</label>
            <div class="relative">
              <input
                type="password"
                name="password"
                id="signupPassword"
                value="{{ password }}"
                {%
                if
                redirect
                %}disabled{%
                endif
                %}
                class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                placeholder="Enter password"
              />
              <div id="signupPasswordError" class="form-error"></div>
              <span
                onclick="toggleInput('signupPassword')"
                class="absolute right-3 top-2 cursor-pointer text-gray-500"
              >
                👁
              </span>
            </div>
          </div>

          <!-- Confirm Password -->
          <div class="mb-6">
            <label class="block mb-1">Confirm Password</label>
            <div class="relative">
              <input
                type="password"
                name="confirm_password"
                id="signupConfirmPassword"
                value="{{ confirm }}"
                {%
                if
                redirect
                %}disabled{%
                endif
                %}
                class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
                placeholder="Confirm password"
              />
              <div id="signupConfirmError" class="form-error"></div>
              <span
                onclick="toggleInput('signupConfirmPassword')"
                class="absolute right-3 top-2 cursor-pointer text-gray-500"
              >
                👁
              </span>
            </div>
          </div>

          <!-- Button -->
          <button
            type="submit"
            {%
            if
            redirect
            %}disabled{%
            endif
            %}
            class="w-full bg-[#10367d] text-white py-2 rounded hover:bg-[#0c2c66] mt-5"
          >
            Sign Up
          </button>
        </form>

        <p class="text-center text-sm mt-4">
          Already have an account?
          <a href="/login" class="text-blue-500">Login</a>
        </p>
      </div>
      <script>
        function toggleInput(id) {
          const input = document.getElementById(id);
          input.type = input.type === "password" ? "text" : "password";
        }
      </script>
      <!-- Validation -->
      <script>
        document.querySelector("form").addEventListener("submit", function (e) {
          const name = document.getElementById("signupName");
          const email = document.getElementById("signupEmail");
          const password = document.getElementById("signupPassword");
          const confirmPassword = document.getElementById(
            "signupConfirmPassword",
          );

          clearSignupErrors();

          if (name.value.trim() === "") {
            e.preventDefault();
            showSignupError(
              name,
              "signupNameError",
              "The name field is required.",
            );
            return;
          }

          if (email.value.trim() === "") {
            e.preventDefault();
            showSignupError(email, "signupEmailError", "Email is required.");
            return;
          }

          if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value.trim())) {
            e.preventDefault();
            showSignupError(
              email,
              "signupEmailError",
              "Please enter a valid email address. (e.g., xxx@gmail.com)",
            );
            return;
          }

          if (password.value === "") {
            e.preventDefault();
            showSignupError(
              password,
              "signupPasswordError",
              "Password field is rquired.",
            );
            return;
          }

          if (password.value.length < 8) {
            e.preventDefault();
            showSignupError(
              password,
              "signupPasswordError",
              "Password must be at least 8 characters.",
            );
            return;
          }

          if (
            !/[A-Z]/.test(password.value) ||
            !/[a-z]/.test(password.value) ||
            !/[0-9]/.test(password.value)
          ) {
            e.preventDefault();
            showSignupError(
              password,
              "signupPasswordError",
              "Password must contain at least 1 uppercase, lowercase and number.",
            );
            return;
          }

          if (confirmPassword.value === "") {
            e.preventDefault();
            showSignupError(
              confirmPassword,
              "signupConfirmError",
              "Please confirm your password.",
            );
            return;
          }

          if (password.value !== confirmPassword.value) {
            e.preventDefault();
            showSignupError(
              confirmPassword,
              "signupConfirmError",
              "Passwords do not match.",
            );
            return;
          }
        });

        function showSignupError(input, errorId, message) {
          const errorBox = document.getElementById(errorId);
          input.classList.add("input-error");
          errorBox.innerText = message;
          errorBox.classList.add("show");
        }

        function clearSignupErrors() {
          const fields = [
            ["signupName", "signupNameError"],
            ["signupEmail", "signupEmailError"],
            ["signupPassword", "signupPasswordError"],
            ["signupConfirmPassword", "signupConfirmError"],
          ];

          fields.forEach(function (item) {
            const input = document.getElementById(item[0]);
            const errorBox = document.getElementById(item[1]);

            input.classList.remove("input-error");
            errorBox.innerText = "";
            errorBox.classList.remove("show");
          });
        }

        [
          "signupName",
          "signupEmail",
          "signupPassword",
          "signupConfirmPassword",
        ].forEach(function (id) {
          document.getElementById(id).addEventListener("focus", function () {
            this.classList.remove("input-error");

            const errorMap = {
              signupName: "signupNameError",
              signupEmail: "signupEmailError",
              signupPassword: "signupPasswordError",
              signupConfirmPassword: "signupConfirmError",
            };

            const errorBox = document.getElementById(errorMap[id]);
            errorBox.innerText = "";
            errorBox.classList.remove("show");

            const message = document.getElementById("signupMessage");
            const subtitle = document.getElementById("signupDefaultSubtitle");

            if (message) {
              message.style.display = "none";
            }

            if (subtitle) {
              subtitle.style.display = "block";
            }
          });
        });
      </script>

      <script>
        window.addEventListener("load", function () {
          const message = document.getElementById("signupMessage");
          const subtitle = document.getElementById("signupDefaultSubtitle");

          if (!message) return;

          subtitle.style.display = "none";
        });
      </script>
    </div>
  </body>
</html>

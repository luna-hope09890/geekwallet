<!doctype html>
<html>
  <head>
    <title>Connection Error</title>
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #02085c;
        color: white;
        font-family: Georgia, "Times New Roman", serif;
      }

      .error-box {
        width: 650px;
        border: 1px solid #ff4d4d;
        border-radius: 10px;
        padding: 40px;
        text-align: center;
      }

      .icon {
        margin-bottom: 20px;
      }

      .icon img {
        width: 120px;
        height: auto;
      }

      h1 {
        margin-top: 15px;
        margin-bottom: 20px;
        font-size: 52px;
        font-weight: 700;
      }

      p {
        line-height: 1.7;
      }

      .refresh-btn {
        display: inline-block;
        margin-top: 20px;
        color: #00cfff;
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="error-box">
      <div class="icon">
        <img
          src="{{ url_for('static', filename='images/warning-icon.png') }}"
          alt="Warning"
        />
      </div>
      <h1>Connection Error</h1>
      <p>
        Unable to connect to the server.<br />
        Please check your internet connection and try again.
      </p>
      <a class="refresh-btn" href="javascript:location.reload()">
        <u>Refresh </u></a
      >
    </div>
  </body>
</html>

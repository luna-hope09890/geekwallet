<!doctype html>
<html>
  <head>
    <title>404 - Page Not Found</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #02085c;
        font-family: Georgia, "Times New Roman", serif;
        color: white;
      }

      .box {
        border: 1px solid red;
        border-radius: 10px;
        padding: 50px;
        text-align: center;
        width: 500px;
      }

      .icon {
        margin-bottom: 20px;
      }

      .icon img {
        width: 120px;
        height: auto;
      }

      h1 {
        font-size: 40px;
      }

      a {
        color: #00cfff;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <div class="icon">
        <img
          src="{{ url_for('static', filename='images/warning-icon.png') }}"
          alt="Warning"
        />
      </div>
      <h1>Page Not Found</h1>
      <p>The page you are looking for does not exist.</p>
      <a href="/">Go Back Home</a>
    </div>
  </body>
</html>

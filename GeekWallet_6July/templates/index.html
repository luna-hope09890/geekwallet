<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GeekWallet</title>
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='images/wallet.png') }}"
    />
    <style>
      body {
        font-family: Georgia, "Times New Roman", serif;
      }
    </style>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/public_nav.css') }}"/>
  </head>

  <body
    class="min-h-screen bg-no-repeat bg-right bg-cover"
    style="background-image: url('{{ url_for('static', filename='images/Background.PNG') }}'); background-color: #f5f5f5;">
    
    <!-- 🔝 Navbar -->
    <nav class="public-topbar public-topbar-left">
      <a href="/" class="public-logo"><i class="fa-solid fa-wallet"></i>GeekWallet</a>
      
      <div class="public-links">
        <a href="/about">About Us</a>
        <a href="/support">Support</a>
        <span class="public-divider">|</span>
        <a href="/login">Login</a>
      </div>
      
    </nav>

    <!-- 🧱 Hero Section -->
    <section
      class="flex flex-col xl:flex-row items-center justify-between px-8 md:px-12 xl:px-16 py-14 xl:py-20 gap-8 xl:gap-16 overflow-hidden"
    >
      <!-- Left -->
      <div class="max-w-2xl text-center xl:text-left">
        <h1 class="text-[26px] md:text-[28px] lg:text-[30px] mb-6 leading-snug">
          Take Control of Your Money, One Step at a Time
        </h1>

        <p
          class="text-[18px] md:text-[20px] xl:text-[22px] text-gray-600 mb-8 leading-relaxed"
        >
          Track your income and expenses, manage budgets, and reach your
          financial goals with ease.
        </p>

        <div class="mt-8 xl:ml-[250px]"> <!-- Get Started alignment -->
          <a href="{{ url_for('signup') }}" class="inline-flex items-center justify-center w-[143px] h-[42px] bg-[#10367d] text-white rounded-lg hover:bg-[#0C2C66] transition shadow-md"
          >Get Started</a>
        </div>
      </div>

      <!-- Right -->
      <div class="flex justify-center flex-1 w-full">
        <img
          src="{{ url_for('static', filename='images/landingPage.png') }}"
          class="w-[75%] md:w-[420px] lg:w-[520px] xl:w-[700px] max-w-full rounded-2xl""
        />
      </div>
    </section>
  </body>
</html>

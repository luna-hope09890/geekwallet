<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>GeekWallet</title>
    <link
      rel="icon"
      type="image/png"
      href="{{ url_for('static', filename='images/wallet.png') }}"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/public_nav.css') }}">
    <style>
      body {
        font-family: Georgia, "Times New Roman", serif;
      }
    </style>
  </head>

  

  <body class="bg-gray-100 min-h-screen">

  <!-- NAVBAR -->
  <nav class="public-topbar public-topbar-center">
    <a href="/" class="public-logo">
        <i class="fa-solid fa-wallet"></i>
        GeekWallet
    </a>
</nav>

  <!-- LOGIN CARD -->
  <div class="flex justify-center px-6 py-16">

    <div class="bg-white p-10 rounded-2xl shadow-lg w-full max-w-md border border-gray-200">

      <h1 class="text-4xl font-bold text-center mb-3">
        Welcome Back
      </h1>

      <div id="loginStatusArea" class="text-center mb-4">
        <p id="defaultSubtitle" class="text-gray-500">
          Your financial progress is waiting for you.
        </p>
        {% if message %}
        <div id="loginMessage" class="message-card {{ message.type }}">
          <strong>{{ message.title }}</strong>
          {% if message.detail %}
          <div>{{ message.detail }}</div>
          {% endif %}
        </div>
        {% endif %}
      </div>

      <form method="POST" action="/login">
        <!-- Email -->
        <div class="mb-4 relative">
          <label class="block mb-1">Email Address</label>
          <!-- red validation messages under email field-->
          <input
            type="text"
            id="loginEmail"
            name="email"
            value="{{ email }}"
            {% if login_success %}disabled{% endif %}
            class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
            placeholder="Enter your email"
          />

          <div id="loginEmailError" class="form-error"></div>
        </div>

        <!-- Password -->
        <div class="mb-2 relative">
          <label class="block mb-1">Password</label>

          <div class="relative">
            <!-- red validation messages under password field-->
            <input
              type="password"
              name="password"
              id="login_password"
              value="{{ password }}"
              {% if login_success %}disabled{% endif %}
              class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-400"
              placeholder="Enter password"
            />
            <div id="loginPasswordError" class="form-error"></div>
            <span
              onclick="toggleInput('login_password')"
              class="absolute right-3 top-2 cursor-pointer text-gray-500"
            >
              👁
            </span>
          </div>
        </div>

        <!-- Forgot -->
        <div class="text-right mb-4">
          <a href="/forgot" class="text-sm text-blue-500">Forgot Password?</a>
        </div>

        <!-- Button -->
         <!-- Luna added: if on 6/23/2026-->
        <button
          id="loginBtn"
          type="submit"
          {% if login_success %}disabled{% endif %}
          class="w-full text-white py-2 rounded bg-[#10367d] hover:bg-[#0c2c66]">
          Login to GeekWallet
        </button>
      </form>

      <p class="text-center text-sm mt-4">
        No account yet?
        <a href="/signup" class="text-blue-500">Sign Up Here</a>
      </p>
    </div>
    {% if redirect %}
    <script>

      setTimeout(() => {
        window.location.href = "/dashboard";
      }, 2000);

    </script>    
    {% endif %}

    <!-- toggle -->
    <script>
      function toggleInput(id) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
      }
    </script>

     <!-- Validation -->
    <script>
      document.querySelector("form").addEventListener("submit", function(e) {
        const email = document.getElementById("loginEmail");
        const password = document.getElementById("login_password");

        const emailError = document.getElementById("loginEmailError");
        const passwordError = document.getElementById("loginPasswordError");

        clearLoginErrors();

        if (email.value.trim() === "") {
          e.preventDefault();
          showLoginError(email, emailError, "Email is required.");
          return;
        }

        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value.trim())) {
          e.preventDefault();
          showLoginError(email, emailError, "Please enter a valid email address.");
          return;
        }

        if (password.value === "") {
          e.preventDefault();
          showLoginError(password, passwordError, "Password field is rquired.");
          return;
        }
      });

      function showLoginError(input, errorBox, message) {
        input.classList.add("input-error");
        errorBox.innerText = message;
        errorBox.classList.add("show");
      }

      function clearLoginErrors() {
        const email = document.getElementById("loginEmail");
        const password = document.getElementById("login_password");

        const emailError = document.getElementById("loginEmailError");
        const passwordError = document.getElementById("loginPasswordError");

        email.classList.remove("input-error");
        password.classList.remove("input-error");

        emailError.innerText = "";
        passwordError.innerText = "";
        emailError.classList.remove("show");
        passwordError.classList.remove("show");
      }

      document.getElementById("loginEmail").addEventListener("focus", function () {

        // validation
        this.classList.remove("input-error");
        document.getElementById("loginEmailError").innerText = "";

        // Only for Invalid Credentials
        {% if message and message.title == "Invalid Credentials" %}
          this.value = "";
          document.getElementById("login_password").value = "";

          const msg = document.getElementById("loginMessage");
          const subtitle = document.getElementById("defaultSubtitle");

          if (msg) msg.style.display = "none";
          if (subtitle) subtitle.style.display = "block";
        {% endif %}
      });

      document.getElementById("login_password").addEventListener("focus", function() {
        this.classList.remove("input-error");
        document.getElementById("loginPasswordError").innerText = "";
      });
    </script>

    <script>
      window.addEventListener("load", function () {
        const message = document.getElementById("loginMessage");
        const subtitle = document.getElementById("defaultSubtitle");
        if (!message) return;
        subtitle.style.display = "none";
      });

      function restoreLoginSubtitle() {
        const message = document.getElementById("loginMessage");
        const subtitle = document.getElementById("defaultSubtitle");

        if (message) {
          message.style.display = "none";
        }

        if (subtitle) {
          subtitle.style.display = "block";
        }
      }

      document.getElementById("login_password").addEventListener("focus", function () {
        {% if message and message.title == "Invalid Password" %}
        this.value = "";
        restoreLoginSubtitle();
        {% endif %}
      });

      document.getElementById("loginEmail").addEventListener("focus", function () {
        {% if message and message.title == "Invalid Credentials" %}
        this.value = "";
        document.getElementById("login_password").value = "";
        restoreLoginSubtitle();
        {% endif %}
      });
  </script>

  </body>
</html>
